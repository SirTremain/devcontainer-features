name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        baseImage:
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Ensure host Codex state directory exists"
        run: mkdir -p ~/.codex

      - name: "Generating tests for 'codex' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f codex -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Ensure host Codex state directory exists"
        run: mkdir -p ~/.codex

      - name: "Generating tests for 'codex' scenarios"
        run: devcontainer features test -f codex --skip-autogenerated --skip-duplicated .
